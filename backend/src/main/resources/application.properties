spring.application.name=PetAdoptionSuppliesApplication
server.port=8081

# =========================
# Railway MySQL Database (or any other DB)
# =========================
spring.datasource.url=${DB_URL:jdbc:mysql://trolley.proxy.rlwy.net:22838/railway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:local_fallback_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =========================
# JWT Configuration
# =========================
app.jwt.secret=${JWT_SECRET:PetShop_Secret_Key_@2026_Srivarshini}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# =========================
# STRIPE CONFIGURATION
# =========================
stripe.api.key=${STRIPE_API_KEY:sk_test_local_fallback_key}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_test_local_fallback_secret}

# =========================
# Flyway Migration
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =========================
# Swagger UI
# =========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =========================
# Logging
# =========================
logging.level.com.petmarketplace=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO